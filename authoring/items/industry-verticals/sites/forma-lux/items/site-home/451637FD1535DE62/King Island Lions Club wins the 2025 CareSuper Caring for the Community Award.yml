    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>This year, the inaugural CareSuper Caring for the Community Award went to the Lions Club of King Island for their outstanding leadership and compassion during the 2024 drought.</p><p>On a recent visit, CareSuper’s Senior Employer Relationships Manager, Colleen Harbod, spoke with Sarina Laidler from the Lions Club to hear their inspiring story.</p><h6><br /><strong>Volunteers: The Heartbeat of King Island</strong></h6><p><br />Before the drought relief project began, one thing was already clear: King Island’s greatest strength is its people.</p><p>‘Volunteers are everything here,’ said Sarina.</p><p>‘King Island has one of Australia’s highest volunteer rates. People give their time because they care. That’s what keeps us going.’</p><p>From bucketing feed by hand to coordinating events and distributing care packages, volunteers were the driving force behind every initiative. Their compassion and commitment didn’t just meet immediate needs—they helped rebuild hope and connection across the island.</p><p>It’s this spirit of giving that turns a crisis response into long-term resilience — and it’s why CareSuper is proud to support those who lead with heart.</p><p>&nbsp;</p><h6>How it began: The Drought Relief Project</h6><p><br />As the island’s only service club, the Lions Club has always supported King Island. But the worst drought in living memory made the need urgent.</p><p>‘Farming is our backbone—our identity and economy depend on it,’ said Sarina. ‘When pastures dried up, it impacted everyone.’</p><p>With farming ties, Sarina and secretary Linda Payne quickly mobilised, reconnecting with Need for Feed, a national Lions initiative, to secure early fodder shipments. A meeting with the Lions disaster relief coordinator sparked swift action across Tasmania.</p><p>‘It all came together through strong partnerships, quick action, and our community’s determination.’</p><h6><br />Lifting spirits across the community&nbsp;</h6><p><br />Stock feed shortages affected farmers big and small, and the wider community faced economic and mental health challenges.</p><p>‘With a background in health promotion, I knew it was about more than feed — it was about connection and hope,’ said Sarina.</p><p>Support came from local groups like the Senior Citizens Association and off-island donors. The Club managed fair distribution of pellets, molasses, and lick blocks — even bucketing pellets by hand at first.</p><p>The Acts of Kindness project sent care packages to every household, reminding people they weren’t alone.</p><h6><br />Hay Day, Coffee Connections, and community spirit&nbsp;</h6><p><br />Hay Day marked a major hay shipment, with local farmers, transport operators, and Tas Farmers joining the effort. The Lions coordinated meals for volunteers during the long day.</p><p>Need for Feed’s team visited with trucks despite rough seas, and the community celebrated at a Farmers Off the Farm event.&nbsp;<br />Coffee Connections, run with Rural Alive and Well, King Island Larder, Tas Farmers, and Lions, offered a space for farmers to connect and discuss mental health.</p><p>‘Although turnout was small, creating that space was vital,’ said Sarina.</p><p>Initiatives like these show the power of community-led action, and we’re proud to champion the people and projects that build stronger, more connected communities for the future.</p><h6><br />Resilience through care and connection&nbsp;</h6><p><br />‘The project made sure people felt supported and connected — that’s what builds real resilience,’ Sarina reflected.</p><p>‘Crisis response matters, but relationships built beforehand make the biggest difference.’</p><p><br />Advice for other regional communities&nbsp;<br />‘Start with genuine engagement. Don’t bring solutions — listen. Locals have the knowledge, they just need empowerment.’</p><p>Sarina encourages investing in community education and leadership, citing the Centre for Disaster Resilience as a great resource.</p><p>‘Let communities lead. Build from the ground up. That’s how you create lasting support.’</p><p><br />CareSuper is proud to support Tasmania’s community champions&nbsp;<br />We’re inspired by stories like this — where leadership and volunteer spirit create lasting change. Supporting the Tasmanian Community Achievement Awards reflects our commitment to celebrating those who make Tasmania a better place to live and work.&nbsp;</p></div>
